version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leadforge
    ports:
      - "5432:5432"
    volumes:
      - leadforge_db_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["legacy-local-ollama"]
    ports:
      - "11434:11434"
    volumes:
      - leadforge_ollama_data:/root/.ollama
    # NOTE: no longer used by default — the backend now calls Groq's hosted
    # API (see backend/.env GROQ_API_KEY) so this app runs without any local
    # model. This service is kept behind a Compose profile in case you want
    # to go back to a fully local/offline setup; start it explicitly with
    # `docker compose --profile legacy-local-ollama up`.
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve &
       sleep 5 &&
       ollama pull llama3 &&
       wait"

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/leadforge
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  leadforge_db_data:
  leadforge_ollama_data:
